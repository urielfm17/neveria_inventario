<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menú Principal</title>

    <link rel="stylesheet" href="../CSS/index.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script src="../JS/auth.js"></script>
</head>

<body>

    <div class="contenedor">

        <!-- ENCABEZADO -->
        <div class="top-bar">

            <div class="usuario">
                Usuario:
                <!-- ✅ FIX 2: Nombre dinámico desde localStorage -->
                <span id="nombreUsuario">-</span>
            </div>

            <h1>Helados Luz del Día</h1>

            <!-- ✅ FIX 1: Botón con función de cerrar sesión -->
            <button class="btn-cerrar" onclick="cerrarSesion()">
                Cerrar sesión
            </button>

        </div>

        <!-- BOTONES -->
        <div class="panel-botones">

            <button class="btn-menu" onclick="window.location.href='helados.html'">
                Helados
            </button>

            <button class="btn-menu" onclick="window.location.href='paletas.html'">
                Paletas
            </button>

            <button class="btn-menu" onclick="window.location.href='helados15L.html'">
                Helados 15L
            </button>

            <a href="reportes.html">
                <button class="btn-menu reportes">
                    Reportes
                </button>
            </a>

        </div>

        <!-- BUSCADOR -->
        <div class="buscador">

            <input type="text" placeholder="Buscar sabor...">

            <button class="btn-buscar">
                <i class="bi bi-search"></i>
                Buscar
            </button>

        </div>

        <!-- RESUMEN -->
        <div class="tabla-contenedor">

            <table>

                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Presentación</th>
                        <th>Cantidad</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody id="tablaProductos">
                    <!-- Los datos se insertan aquí dinámicamente con JavaScript -->
                </tbody>

            </table>

            <div class="acciones">

                <button class="btn-pdf" onclick="generarPDF()">
                    <i class="bi bi-file-earmark-pdf"></i>
                    Guardar y generar PDF
                </button>

                <button class="btn-limpiar" onclick="limpiarCarrito()">
                    <i class="bi bi-trash"></i>
                    Limpiar carrito
                </button>

            </div>

        </div>

    </div>

    

    

</body>
<script src="../JS/index.js"></script>
</html>
