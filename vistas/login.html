<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../CSS/login.css">
    
</head>
<body>
   <div class="card">
    <div class="logo"><i class="fas fa-ice-cream"></i></div>
    <h1>Bienvenido</h1>
    <p>Inicia sesión para continuar</p>

    <form id="form">
        <label>Email</label>
        <input type="email" id="email" placeholder="correo@ejemplo.com">
        <div class="error-text" id="error-email">El email es requerido</div>

        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Tu contraseña">
        <div class="error-text" id="error-password">La contraseña es requerida</div>

        <button type="submit">Iniciar Sesión</button>
    </form>

    <div class="link">¿No tienes cuenta? <a href="registro.html">Regístrate</a></div>
</div>
</body>
 <script src="../JS/login.js"></script>
</html>
