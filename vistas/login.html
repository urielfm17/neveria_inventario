<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Helados Luz del Día</title>
    <link rel="stylesheet" href="../CSS/login.css">
</head>
<body>
    <div class="login-card">
        <h1 class="login-title">Bienvenido</h1>
        <p class="login-subtitle">Inicia sesión con tu cuenta</p>

        <div id="error-msg"
             style="display:none; color:#c62828; background:#ffebee;
             padding:10px 14px; border-radius:6px; margin-bottom:14px;
             font-size:14px;">
        </div>

        <div class="input-group">
            <label>Correo electrónico</label>
            <input type="email" id="email" placeholder="tu@email.com">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button type="button" class="btn-login" onclick="iniciarSesion()">
            Iniciar Sesión
        </button>
    </div>

    <script>
        async function iniciarSesion() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errDiv = document.getElementById('error-msg');
            const btn = document.querySelector('.btn-login');

            errDiv.style.display = 'none';

            if (!email || !password) {
                errDiv.textContent = 'Por favor completa todos los campos.';
                errDiv.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Verificando...';

            try {
                const res = await fetch('../php/login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        password
                    })
                });

                const data = await res.json();

                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errDiv.textContent = data.message;
                    errDiv.style.display = 'block';
                }

            } catch (error) {
                errDiv.textContent = 'No se pudo conectar al servidor.';
                errDiv.style.display = 'block';
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Iniciar Sesión';
            }
        }

        // Permitir Enter
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                iniciarSesion();
            }
        });
    </script>
</body>
</html>
