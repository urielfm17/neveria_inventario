<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../CSS/registro.css">
    
</head>
<body>
    
    <div class="card">
    <div class="logo"><i class="fas fa-ice-cream"></i></div>
    <h1>Crear Cuenta</h1>
    <p>Regístrate para tu nevería</p>

    <form id="form">
        <label>Nombre</label>
        <input type="text" id="nombre" placeholder="Juan Pérez">
        <div class="error-text" id="error-nombre">El nombre es requerido</div>

        <label>Nevería</label>
        <input type="text" id="neveria" placeholder="Nevería El Sueño">

        <label>Email</label>
        <input type="email" id="email" placeholder="correo@ejemplo.com">
        <div class="error-text" id="error-email">Ingresa un email válido</div>

        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres">
        <div class="error-text" id="error-password">Mínimo 6 caracteres</div>

        <label>Confirmar Contraseña</label>
        <input type="password" id="confirmar" placeholder="Repite la contraseña">
        <div class="error-text" id="error-confirmar">Las contraseñas no coinciden</div>

        <button type="submit">Crear Cuenta</button>
    </form>

    <div class="link">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></div>
</div>
</body>
 <script src="../JS/registro.js"></script>
</html>
