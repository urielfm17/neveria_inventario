<html lang="es">

<body>

    <div class="contenedor">

            <div class="card">

            <div class="card">
                <h3>Tamarindo</h3>

                <button class="btn-seleccionar" onclick="agregarProducto('Paleta de Tamarindo', 'Paleta', this)">Seleccionar</button>
            </div>

        </div>

        <div class="acciones">

            <button class="inicio" onclick="window.location.href='index.html'">
                MENÚ PRINCIPAL
            </button>
        </div>

    </div>

    <script src="../JS/paletas.js"></script>

</body>

</html>
